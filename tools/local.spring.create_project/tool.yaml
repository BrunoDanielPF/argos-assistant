schema_version: "1.0"
name: local.spring.create_project
version: "1.0.0"
title: Criar projeto Spring Boot
description: Cria uma estrutura inicial de backend Spring Boot sem rede ou shell.
runtime:
  type: python
  python: ">=3.12,<3.13"
  entrypoint: handler.py
input_schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  additionalProperties: false
  required:
    - name
    - directory
    - java_version
    - build_tool
    - group_id
  properties:
    name:
      type: string
      pattern: "^[a-z][a-z0-9-]{1,62}$"
    directory:
      type: string
      minLength: 1
    java_version:
      type: integer
      enum: [17, 21]
    build_tool:
      type: string
      enum: [maven, gradle]
    group_id:
      type: string
      pattern: "^[a-z][a-z0-9_.]+$"
output_schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  additionalProperties: false
  required: [project_path, created_files]
  properties:
    project_path:
      type: string
    created_files:
      type: array
      items:
        type: string
permissions:
  filesystem:
    read: []
    write:
      - "${directory}/${name}/**"
  network:
    enabled: false
    hosts: []
  subprocess:
    executables: []
execution:
  timeout_seconds: 30
  max_output_bytes: 1048576
